name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push ${{ matrix.component }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            image: bogdancstrike/dentnow-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - component: backend
            image: bogdancstrike/dentnow-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: bogdancstrike
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate ${{ matrix.component }} Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=DentNow ${{ matrix.component }}

      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Publication builds intentionally start clean. This prevents a stale GHA
          # BuildKit cache from reusing application or dependency layers and refreshes
          # the pinned base image behind each FROM instruction.
          no-cache: true
          pull: true
          provenance: true
          sbom: true
