# DentNow — authoritative Compose deployment (local profile).
#
# One command brings up the full application stack on clean volumes:
#     ./ops/init-secrets.sh
#     docker compose up --build -d
#
# Startup order (health/completion gated):
#   postgres/minio/keycloak healthy
#     -> minio-init / keycloak-config complete
#     -> migrate complete            (Task 5 migrations)
#     -> seed complete               (Task 13 seed)
#     -> api healthy
#     -> frontend/preview/edge       (Tasks 20)
#
# Secrets come from ./.secrets/ (generated by ops/init-secrets.sh, git-ignored) and
# are consumed via Compose secrets + *_FILE, never plaintext production env values.
# frontend/preview/edge and the production TLS edge are added in Task 20.

name: dentnow

networks:
  dentnow: {}

volumes:
  postgres-data: {}
  minio-data: {}

secrets:
  postgres_password:
    file: ./.secrets/postgres_password
  keycloak_db_password:
    file: ./.secrets/keycloak_db_password
  keycloak_admin_password:
    file: ./.secrets/keycloak_admin_password
  minio_root_password:
    file: ./.secrets/minio_root_password
  minio_app_secret:
    file: ./.secrets/minio_app_secret
  preview_token_pepper:
    file: ./.secrets/preview_token_pepper
  backend_secret_key:
    file: ./.secrets/backend_secret_key

x-backend-env: &backend-env
  ENVIRONMENT: "${ENVIRONMENT:-local}"
  # DATABASE_URL is assembled in each entrypoint after the password secret is read
  # (see the `export DATABASE_URL=...` lines below) — it is intentionally not set here.
  S3_ENDPOINT_URL: "http://minio:9000"
  S3_REGION: "us-east-1"
  S3_BUCKET: "dentnow-media"
  S3_ACCESS_KEY: "${S3_ACCESS_KEY:-dentnow-app}"
  S3_USE_PATH_STYLE: "true"
  KEYCLOAK_PUBLIC_URL: "${PUBLIC_KEYCLOAK_URL:-http://localhost:8080}"
  KEYCLOAK_INTERNAL_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "doncik"
  KEYCLOAK_SPA_CLIENT_ID: "dentnow-admin-spa"
  KEYCLOAK_AUDIENCE: "dentnow-api"
  KEYCLOAK_AUTHORIZED_PARTY: "dentnow-admin-spa"
  ALLOWED_ORIGINS: "${PUBLIC_APP_URL:-http://localhost:3000}"
  LOG_LEVEL: "INFO"

services:

  # ── PostgreSQL 18 (DentNow + Keycloak databases) ─────────────────────────
  postgres:
    image: postgres:18
    networks: [dentnow]
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "dentnow"
      POSTGRES_DB: "dentnow"
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    volumes:
      # postgres:18 stores data in a version subdir under /var/lib/postgresql.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dentnow -d dentnow"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # ── One-shot: provision the isolated `keycloak` database/role (idempotent) ─
  # Runs as root in a client container so it can read the 0600 secret files (the
  # postgres server runs initdb.d scripts as the unprivileged postgres user).
  postgres-init:
    image: postgres:18
    networks: [dentnow]
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      POSTGRES_USER: "dentnow"
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      KEYCLOAK_DB_PASSWORD_FILE: /run/secrets/keycloak_db_password
    secrets: [postgres_password, keycloak_db_password]
    entrypoint: ["/bin/sh", "/init/01-create-keycloak.sh"]
    volumes:
      - ./backend/docker/postgres/01-create-keycloak.sh:/init/01-create-keycloak.sh:ro
    restart: "no"

  # ── MinIO (private S3-compatible media store) ────────────────────────────
  minio:
    image: quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
    networks: [dentnow]
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-dentnow-root}"
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets: [minio_root_password]
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # ── One-shot: create bucket, versioning, least-privilege policy + app user
  minio-init:
    image: quay.io/minio/mc:RELEASE.2024-11-21T17-21-54Z
    networks: [dentnow]
    depends_on:
      minio: {condition: service_started}
    environment:
      S3_BUCKET: "dentnow-media"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-dentnow-app}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-dentnow-root}"
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      S3_APP_SECRET_FILE: /run/secrets/minio_app_secret
    secrets: [minio_root_password, minio_app_secret]
    entrypoint: ["/bin/sh", "/init/init.sh"]
    volumes:
      - ./backend/docker/minio/init.sh:/init/init.sh:ro
      - ./backend/docker/minio/dentnow-policy.json:/policies/dentnow-policy.json:ro
    restart: "no"

  # ── Keycloak 26.1 (realm doncik, backed by its own PostgreSQL database) ──
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    networks: [dentnow]
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8080}:8080"
    depends_on:
      postgres: {condition: service_healthy}
      postgres-init: {condition: service_completed_successfully}
    environment:
      KC_DB: "postgres"
      KC_DB_URL: "jdbc:postgresql://postgres:5432/keycloak"
      KC_DB_USERNAME: "keycloak"
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN_USER:-admin}"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
    secrets: [keycloak_db_password, keycloak_admin_password]
    # Read secret files into KC_* env, then start. Local profile uses start-dev;
    # Task 20 switches production to `start` with strict HTTPS hostnames.
    entrypoint:
      - /bin/bash
      - -c
      - |
        export KC_DB_PASSWORD="$(cat /run/secrets/keycloak_db_password)"
        export KC_BOOTSTRAP_ADMIN_PASSWORD="$(cat /run/secrets/keycloak_admin_password)"
        exec /opt/keycloak/bin/kc.sh start-dev
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e \"GET /health/ready HTTP/1.0\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q \"200 OK\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  # ── One-shot: idempotently upsert realm doncik, clients, mapper, roles ──
  keycloak-config:
    image: quay.io/keycloak/keycloak:26.1
    networks: [dentnow]
    depends_on:
      keycloak: {condition: service_healthy}
    environment:
      KEYCLOAK_INTERNAL_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: "doncik"
      KEYCLOAK_ADMIN_USER: "${KEYCLOAK_ADMIN_USER:-admin}"
      KEYCLOAK_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
      KEYCLOAK_SPA_CLIENT_ID: "dentnow-admin-spa"
      KEYCLOAK_AUDIENCE: "dentnow-api"
      PUBLIC_APP_URL: "${PUBLIC_APP_URL:-http://localhost:3000}"
      PUBLIC_PREVIEW_URL: "${PUBLIC_PREVIEW_URL:-http://localhost:3001}"
      ENVIRONMENT: "${ENVIRONMENT:-local}"
      SEED_ADMIN_USERNAME: "${SEED_ADMIN_USERNAME:-}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-}"
      SEED_E2E_USERS: "${SEED_E2E_USERS:-false}"
    secrets: [keycloak_admin_password]
    entrypoint: ["/bin/bash", "/config/configure-dentnow.sh"]
    volumes:
      - ./keycloak/configure-dentnow.sh:/config/configure-dentnow.sh:ro
    restart: "no"

  # ── Backend image (built once; used by migrate/seed/api) ─────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dentnow-backend
    networks: [dentnow]
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      <<: *backend-env
      SERVICE_NAME: "dentnow-migrate"
    secrets: [postgres_password]
    # POSTGRES_PASSWORD is interpolated into DATABASE_URL from the secret file.
    entrypoint:
      - /bin/bash
      - -c
      - |
        export POSTGRES_PASSWORD="$(cat /run/secrets/postgres_password)"
        export DATABASE_URL="postgresql+psycopg2://dentnow:$${POSTGRES_PASSWORD}@postgres:5432/dentnow"
        exec alembic upgrade head
    restart: "no"

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dentnow-backend
    networks: [dentnow]
    depends_on:
      migrate: {condition: service_completed_successfully}
      minio-init: {condition: service_completed_successfully}
    environment:
      <<: *backend-env
      SERVICE_NAME: "dentnow-seed"
      S3_SECRET_KEY_FILE: /run/secrets/minio_app_secret
    secrets: [postgres_password, minio_app_secret]
    entrypoint:
      - /bin/bash
      - -c
      - |
        export POSTGRES_PASSWORD="$(cat /run/secrets/postgres_password)"
        export DATABASE_URL="postgresql+psycopg2://dentnow:$${POSTGRES_PASSWORD}@postgres:5432/dentnow"
        export S3_SECRET_KEY="$(cat /run/secrets/minio_app_secret)"
        exec python seed.py
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dentnow-backend
    networks: [dentnow]
    ports:
      - "127.0.0.1:${API_PORT:-5100}:5100"
    depends_on:
      postgres: {condition: service_healthy}
      keycloak: {condition: service_healthy}
      keycloak-config: {condition: service_completed_successfully}
      minio-init: {condition: service_completed_successfully}
      migrate: {condition: service_completed_successfully}
      seed: {condition: service_completed_successfully}
    environment:
      <<: *backend-env
      SERVICE_NAME: "dentnow-api"
      GUNICORN_WORKERS: "2"
      BUILD_REVISION: "${BUILD_REVISION:-dev}"
    secrets: [postgres_password, minio_app_secret, preview_token_pepper, backend_secret_key]
    entrypoint:
      - /bin/bash
      - -c
      - |
        export POSTGRES_PASSWORD="$(cat /run/secrets/postgres_password)"
        export DATABASE_URL="postgresql+psycopg2://dentnow:$${POSTGRES_PASSWORD}@postgres:5432/dentnow"
        export S3_SECRET_KEY="$(cat /run/secrets/minio_app_secret)"
        export PREVIEW_TOKEN_PEPPER="$(cat /run/secrets/preview_token_pepper)"
        export SECRET_KEY="$(cat /run/secrets/backend_secret_key)"
        exec gunicorn -c gunicorn.conf.py wsgi:app
    restart: unless-stopped

  # ── Frontend (Vite build served by nginx; /api reverse-proxied to the API) ─
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: dentnow-frontend
    networks: [dentnow]
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"
    depends_on:
      api: {condition: service_healthy}
    environment:
      API_UPSTREAM: "http://api:5100"
      APP_API_BASE: "/api"
      APP_KEYCLOAK_URL: "${PUBLIC_KEYCLOAK_URL:-http://localhost:8080}"
      APP_KEYCLOAK_REALM: "doncik"
      APP_KEYCLOAK_CLIENT_ID: "dentnow-admin-spa"
      APP_PREVIEW_URL: "${PUBLIC_PREVIEW_URL:-http://localhost:3001}"
      BUILD_REVISION: "${BUILD_REVISION:-dev}"
    restart: unless-stopped
